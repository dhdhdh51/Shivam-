<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vasanth — Soul of Indian Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#fdf6ec;
}

/* SIMPLE FIXED NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  background:#fff;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1 {
  font-family:'Playfair Display',serif;
  font-size:40px;
}

button {
  padding:10px 20px;
  border:none;
  background:#c96a3a;
  color:white;
  border-radius:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <b>Vasanth</b>
  <div>
    🛍️ <span id="cartCount">0</span>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>Indian Fashion Store</h1>
    <p>Fully Working GitHub Version ✅</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>
</section>

<script>
let count = 0;

function addToCart(){
  count++;
  document.getElementById("cartCount").innerText = count;
}
</script>

</body>
</html>
